name: tement_mobile
description: Application de location de logements
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # État et navigation
  provider: ^6.1.1
  go_router: ^13.0.1
  
  # Réseau
  http: ^1.1.0
  dio: ^5.4.0
  
  # Stockage local
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Images
  image_picker: ^1.0.5
  cached_network_image: ^3.3.1
  
  # Utilitaires
  intl: ^0.18.1
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icone.png"
  adaptive_icon_background: "#2B245A"
  adaptive_icon_foreground: "assets/icon/icone_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/